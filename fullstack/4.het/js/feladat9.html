<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title></title>
        <link href="css/style.css" rel="stylesheet">
    </head>
    <body>
        <p id="test"></p>
        <script>
            const szemely = 
                {
                    vezNev:"Kovács",
                    kerNev:"Lajos",
                    azon:234
                };
            let szoveg = "";
            for (let x in szemely)
            {
                szoveg=szemely[x] += " ";
            }
            document.getElementById("test").innerHTML="A szemely adatai: " + "<br>" + szoveg;
        </script>
    
    </body>
</html>
