<!DOCTYPE html>
<html lang="hu">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width-device-width, initnial-scale 1.0">
        <title>Űrlap</title>
    </head>
    <body>
        <form method="post">
            <table border="2px" bgcolor="lightblue">
                <tr>
                    <th>Tulajdonság</th>
                    <th>Bevitt adat</th>
                </tr>

                <tr>
                    <td> Neved </td>
                    <td>
                        <input type="text" name="nev" required="required">
                    </td>
                </tr>
                <tr>
                    <td>Korod</td>
                    <td>
                        <input type="number" name="kor" value="0" required="required">
                    </td>
                </tr>

                <tr>
                    <td>Nemed</td>
                    <td>
                        <input type="radio" name="nem" value="no">Nő <br>
                        <input type="radio" name="nem" value="ferfi">Férfi <br>
                    </td>
                </tr>
                <tr>
                    <td>A kék a kedvenc színed?</td>
                    <td>
                        <input type="checkbox" name="kek_e" value="">
                    </td>
                </tr>
                
            </table>
            
        </form>
    </body>
    
</html>
